<style>/* ─────────────────────────────────────────────────────────────
   YachtWay Competitive Intelligence - Report styles
   ───────────────────────────────────────────────────────────── */

:root {
  /* YachtWay typography - pulled from the design system (Figma "❖ Design System") */
  --font-body:    'Figtree', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-display: 'Poppins', 'Figtree', system-ui, sans-serif;
  --font-ui:      'Figtree', 'Poppins', system-ui, sans-serif;
  /* Legacy aliases mapped to the canonical YachtWay design-system tokens
     defined in the :root above (gray-* and brand-*). Kept so the older
     selectors below keep working without a sweep. New code should reach
     for var(--gray-900), var(--brand-700), etc. directly. */
  --ink:    var(--gray-950);   /* ink surface / dark sections */
  --ink-2:  var(--gray-900);
  --ink-3:  var(--gray-800);
  --paper:  var(--white);
  --paper-2: var(--gray-100);
  --rule:   var(--gray-200);
  /* Accent on dark · was "gold" in the legacy layer; now points at the brand purple ramp */
  --gold:   var(--brand-500);  /* primary accent on ink surfaces */
  --gold-2: #B998FF;           /* lighter purple highlight */
  --gold-3: var(--brand-800);  /* deeper pressed purple */
  --warn-red: #B42318;
  --ok-green: #297B00;

  /* source pill categories */
  --src-semrush: #7F56D9;
  --src-onsite:  #297B00;
  --src-social:  #C8B100;
  --src-press:   #B42318;
  --src-derived: #708090;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--gray-900);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
img, svg { display: block; max-width: 100%; }
button { font-family: inherit; }

/* ── Scroll progress bar ── */
.scroll-progress {
  position: fixed; top: 0; left: 0;
  height: 2px; width: 0%;
  background: linear-gradient(90deg, var(--gold-3), var(--gold), var(--gold-2));
  z-index: 200;
  transition: width 60ms linear;
}

/* ── Top nav ── */
.topnav {
  position: fixed; top: 0; left: 0; right: 0;
  height: 76px; padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(251,250,246,0.88);
  backdrop-filter: saturate(180%) blur(14px);
  -webkit-backdrop-filter: saturate(180%) blur(14px);
  border-bottom: 1px solid rgba(0,0,0,.06);
  z-index: 150;
}
.topnav.dark {
  background: rgba(7,6,11,0.78);
  backdrop-filter: saturate(160%) blur(14px);
  -webkit-backdrop-filter: saturate(160%) blur(14px);
  border-bottom: 1px solid rgba(255,255,255,.08);
  color: var(--paper);
}
.topnav .brand {
  font-family: var(--font-display); font-weight: 700;
  letter-spacing: -0.01em; font-size: 15px;
  display: flex; align-items: center; gap: 10px;
}
.topnav .brand-logo {
  color: var(--ink);
  display: block;
}
.topnav.dark .brand-logo { color: var(--paper); }
.topnav .yw-logo-img {
  height: 25px; width: auto; display: block;
}
.topnav .yw-logo-light { display: block; }
.topnav .yw-logo-dark  { display: none; }
.topnav.dark .yw-logo-light { display: none; }
.topnav.dark .yw-logo-dark  { display: block; }
.topnav .brand-sep {
  color: var(--gray-400);
  font-weight: 400;
}
.topnav.dark .brand-sep { color: rgba(255,255,255,.35); }
.topnav .brand-tag {
  font-family: var(--font-body);
  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--gray-600); font-weight: 500;
}
.topnav.dark .brand-tag { color: rgba(255,255,255,.55); }

.topnav .nav-cta {
  display: inline-flex; align-items: center; gap: 8px;
  height: 36px; padding: 0 16px;
  background: var(--brand-700); color: #FFFFFF;
  border: 1px solid var(--brand-700);
  border-radius: 4px;
  font-family: var(--font-display);
  font-size: 13px; font-weight: 600; letter-spacing: -0.005em;
  text-decoration: none;
  transition: background .18s ease, color .18s ease, border-color .18s ease, transform .18s ease;

.topnav .nav-cta:hover {
  background: var(--brand-800); color: #FFFFFF; border-color: var(--brand-800);
  transform: translateY(-1px);
}
.topnav.dark .nav-cta {
  background: var(--brand-700); color: #FFFFFF; border-color: var(--brand-700);
}
.topnav.dark .nav-cta:hover {
  background: var(--brand-600); color: #FFFFFF; border-color: var(--brand-600);
}

.topnav .brand-mark-LEGACY {
  width: 22px; height: 22px;
  background: var(--ink); color: var(--paper);
  display: grid; place-items: center;
  font-family: var(--font-display); font-weight: 700;
  font-size: 12px; letter-spacing: 0;
  border-radius: 4px;
}
.topnav.dark .brand-mark { background: var(--gold); color: var(--ink); }
.topnav .nav-meta {
  font-family: var(--font-body);
  font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--gray-600);
}
.topnav.dark .nav-meta { color: rgba(255,255,255,.6); }

/* ── Sections ── */
section {
  position: relative;
  padding: 120px 80px;
}
section.ink {
  background: var(--ink);
  color: var(--paper);
}
section.ink .ds-eyebrow { color: var(--gold); }

.section-grid {
  max-width: 1280px;
  margin: 0 auto;
}
.eyebrow {
  font-family: var(--font-body);
  font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gray-600);
  display: flex; align-items: center; gap: 12px;
}
.ink .eyebrow { color: var(--gold); }
.eyebrow::before {
  content: ""; width: 24px; height: 1px;
  background: currentColor; opacity: 0.6;
}

.display {
  font-family: var(--font-display); font-weight: 700;
  letter-spacing: -0.035em;
  line-height: 0.95;
}

/* ── Collapsible: smooth height expand via grid-template-rows ── */
.collapsible-summary { display: inline; }
.collapsible-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 320ms cubic-bezier(0.4,0,0.2,1);
}
.collapsible.open .collapsible-body {
  grid-template-rows: 1fr;
}
.collapsible-body-inner {
  overflow: hidden;
  min-height: 0;
}
.collapsible.open .collapsible-body-inner { padding-top: 0.4em; }
.collapsible-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 0.5em;
  padding: 0;
  background: transparent;
  border: 0;
  font-family: var(--font-body, inherit);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--brand-700, #6430B0);
  cursor: pointer;
  transition: color 160ms ease, opacity 160ms ease;
}
.collapsible-toggle:hover { color: var(--brand-500, #7F56D9); }
.collapsible-toggle:focus-visible {
  outline: 2px solid var(--brand-500, #7F56D9);
  outline-offset: 3px;
  border-radius: 4px;
}
.bento-card.feature .collapsible-toggle,
.tabbed-section.ink .collapsible-toggle {
  color: rgba(255,255,255,0.85);
}
.bento-card.feature .collapsible-toggle:hover,
.tabbed-section.ink .collapsible-toggle:hover { color: #fff; }

/* Reveal animation · keyframe-based so it isn't throttled in inactive iframes */
@keyframes legacyReveal {
  0%   { opacity: 0; transform: translateY(12px); }
  100% { opacity: 1; transform: translateY(0); }
}
.reveal {
  opacity: 0; transform: translateY(12px);
}
.reveal.in {
  animation: legacyReveal 700ms cubic-bezier(0.16, 1, 0.3, 1) both;
}
.reveal.delay-1.in { animation-delay: 80ms; }
.reveal.delay-2.in { animation-delay: 160ms; }
.reveal.delay-3.in { animation-delay: 240ms; }
.reveal.delay-4.in { animation-delay: 320ms; }

/* ── Hero ── */
.hero {
  min-height: 100vh;
  padding: 120px 80px 80px;

  position: relative; overflow: hidden;
  background: var(--paper);
}
.hero-spotlight {
  position: absolute; inset: 0;
  background: radial-gradient(600px circle at var(--mx, 50%) var(--my, 50%),
              rgba(127, 86, 217, 0.10), transparent 60%);
  pointer-events: none;
  transition: opacity 300ms;
}
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, rgba(20,20,15,.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(20,20,15,.04) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none;
  mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
}
.hero-inner {
  position: relative; z-index: 2;
  max-width: 1280px; margin: 0 auto; width: 100%;
}
.hero-meta {
  display: flex; gap: 24px; flex-wrap: wrap;
  margin-bottom: 64px;
  font-family: var(--font-body);
  font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gray-600);
}
.hero-meta span { position: relative; padding-right: 24px; }
.hero-meta span:not(:last-child)::after {
  content: ""; position: absolute; right: 0; top: 50%;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--gray-400); transform: translateY(-50%);
}
.hero-title {
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(48px, 7vw, 96px);
  line-height: 0.96; letter-spacing: -0.04em;
  max-width: 1100px;
  color: var(--ink);
}
.hero-title em {
  font-family: 'Poppins', system-ui, sans-serif;
  font-style: italic; font-weight: 500;
  color: var(--brand-700);
  letter-spacing: -0.02em;
}
.hero-trio {
  margin-top: 28px;
  display: flex; flex-wrap: wrap; align-items: baseline;
  gap: 18px;
  font-family: var(--font-display);
  font-size: clamp(20px, 2.4vw, 32px);
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--gray-900);
}
.hero-trio-name {
  position: relative;
  padding-bottom: 4px;
  border-bottom: 2px solid var(--gray-300);
}
.hero-trio-dot {
  color: var(--gray-400);
  font-size: 0.7em;
  transform: translateY(-0.18em);
  display: inline-block;
}
.hero-sub {
  margin-top: 32px;
  max-width: 720px;
  font-size: 19px; line-height: 1.55;
  color: var(--gray-700);
  font-weight: 400;
}
.hero-cta-row {
  margin-top: 48px;
  display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
}
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 12px 20px;
  font-family: var(--font-body); font-weight: 500;
  font-size: 14px; letter-spacing: -0.01em;
  border-radius: var(--radius-full);
  border: 1px solid var(--rule);
  background: var(--paper);
  color: var(--ink);
  text-decoration: none;
  cursor: pointer;
  transition: all 180ms ease-out;
}
.btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.btn-primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.btn-primary:hover { background: var(--brand-700); border-color: var(--brand-700); }

/* On-dark variants (cinematic stages, ink sections).
   Same DS metrics · pill shape, 12/20 padding, 14px/500 · flipped tonal palette. */
.btn.on-dark {
  background: transparent;
  color: var(--paper);
  border-color: rgba(255,255,255,.28);
}
.btn.on-dark:hover {
  background: rgba(255,255,255,.08);
  color: var(--paper);
  border-color: rgba(255,255,255,.56);
}
.btn-primary.on-dark {
  background: var(--paper); color: var(--ink); border-color: var(--paper);
}
.btn-primary.on-dark:hover {
  background: var(--brand-500); color: #fff; border-color: var(--brand-500);
}

/* CTA row used in cinematic hero. */
.cin-cta-row {
  margin-top: 56px;
  display: flex; gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

/* ── Hero stat ── */
.hero-stat {
  margin-top: 88px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr);
  gap: 80px;
  align-items: end;
  padding-top: 48px;
  border-top: 1px solid var(--rule);
}
.hero-stat-num {
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(120px, 18vw, 260px);
  line-height: 0.85; letter-spacing: -0.06em;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  display: flex; align-items: baseline; gap: 12px;
}
.hero-stat-unit {
  font-family: 'Poppins', system-ui, sans-serif;
  font-style: italic; font-weight: 500;
  color: var(--brand-700);
  font-size: clamp(28px, 3vw, 44px);
  letter-spacing: -0.02em;
  line-height: 1;
}
.hero-stat-caption {
  padding-bottom: 24px;
}
.hero-stat-caption .label {
  font-family: var(--font-body);
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--gray-600);
}
.hero-stat-caption .desc {
  margin-top: 16px;
  font-size: 18px; line-height: 1.5;
  color: var(--gray-800);
  max-width: 520px;
}
.hero-stat-caption .multipliers {
  margin-top: 24px;
  display: flex; flex-direction: column; gap: 6px;
  font-family: var(--font-body);
  font-size: 12px; color: var(--gray-700);
}
.hero-stat-caption .multipliers strong {
  color: var(--ink); font-family: var(--font-display);
  font-weight: 600; font-size: 14px;
}

/* ── Source pills ── */
.src-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 9px;
  font-family: var(--font-body);
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.06em; text-transform: uppercase;
  border-radius: var(--radius-full);
  background: rgba(20,20,15,.04);
  color: var(--gray-700);
  border: 1px solid var(--rule);
  cursor: help;
  transition: all 180ms ease-out;
  white-space: nowrap;
}
.src-pill::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%;
  background: var(--src-derived);
}
.src-pill[data-src="semrush"]::before { background: var(--src-semrush); }
.src-pill[data-src="onsite"]::before  { background: var(--src-onsite); }
.src-pill[data-src="social"]::before  { background: var(--src-social); }
.src-pill[data-src="press"]::before   { background: var(--src-press); }
.src-pill:hover {
  background: var(--ink); color: var(--paper); border-color: var(--ink);
}
.ink .src-pill {
  background: rgba(255,255,255,.05);
  color: rgba(255,255,255,.75);
  border-color: rgba(255,255,255,.12);
}
.ink .src-pill:hover { background: var(--gold); color: var(--ink); border-color: var(--gold); }

/* Source legend */
.src-legend {
  display: flex; flex-wrap: wrap; gap: 16px 24px;
  font-family: var(--font-body);
  font-size: 11px; color: var(--gray-700);
  margin-top: 32px;
}
.src-legend-item { display: inline-flex; align-items: center; gap: 8px; }
.src-legend-item::before {
  content: ""; width: 8px; height: 8px; border-radius: 50%;
}
.src-legend-item[data-src="semrush"]::before { background: var(--src-semrush); }
.src-legend-item[data-src="onsite"]::before  { background: var(--src-onsite); }
.src-legend-item[data-src="social"]::before  { background: var(--src-social); }
.src-legend-item[data-src="press"]::before   { background: var(--src-press); }
.src-legend-item[data-src="derived"]::before { background: var(--src-derived); }

/* ── Tooltip ── */
.tip-anchor { position: relative; cursor: help; }
.tip {
  position: fixed;
  z-index: 300;
  width: 320px;
  padding: 18px 18px 16px;
  background: var(--ink);
  color: var(--paper);
  border-radius: 12px;
  box-shadow: 0 24px 48px -12px rgba(0,0,0,.4);
  pointer-events: none;
  opacity: 0; transform: translateY(4px);
  transition: opacity 200ms ease-out, transform 200ms ease-out;
  font-family: var(--font-body);
  font-size: 13px; line-height: 1.5;
}
.tip.visible { opacity: 1; transform: translateY(0); }
.tip-section { margin-bottom: 10px; }
.tip-section:last-child { margin-bottom: 0; }
.tip-section .label {
  font-family: var(--font-body);
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 4px;
}
.tip-section .body {
  color: rgba(255,255,255,.9);
}

/* ── Bento grid ──
   6-col, 2-row layout. Feature claims the left half (3 cols × 2 rows).
   Four standard tiles tile cleanly into a 2×2 on the right (3 cols × 1 row
   each). Every tile is the same height · no ragged edges. */
.bento {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: 1fr;
  gap: 16px;
}
.bento-card {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 28px;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative; overflow: hidden;
  transition: transform 240ms ease-out, box-shadow 240ms ease-out, border-color 240ms ease-out;
}
.bento-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 2px 4px rgba(132,144,163,0.08), 0 8px 16px rgba(132,144,163,0.08);
  border-color: var(--gray-300, #DCDCDE);
}
.bento-card.feature {
  grid-column: span 3; grid-row: span 2;
  background: var(--ink); color: var(--paper);
  border-color: var(--ink);
}
.bento-card.feature:hover { box-shadow: 0 30px 60px -20px rgba(20,20,15,.4); }
.bento-card.std-2 { grid-column: span 3; }
.bento-card.std-3 { grid-column: span 3; }
.bento-card .bento-eyebrow {
  font-family: 'Figtree', system-ui, sans-serif; font-size: 12px;
  letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600;
  color: var(--gray-600);
}
.bento-card.feature .bento-eyebrow { color: #B998FF; }
.bento-card .bento-num {
  font-family: var(--font-display); font-weight: 700;
  letter-spacing: -0.04em; line-height: 0.92;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  font-size: 56px;
  margin: 12px 0 4px;
}
.bento-card.feature .bento-num {
  color: var(--paper);
  font-size: clamp(72px, 9.5vw, 128px);
}
.bento-card.feature .bento-num em {
  display: block;
  font-family: 'Figtree', system-ui, sans-serif;
  font-style: normal; font-weight: 500;
  color: rgba(255,255,255,.78);
  font-size: clamp(13px, 1.05vw, 16px);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-left: 0; margin-top: 14px;
}
.bento-card .bento-label {
  font-family: var(--font-display); font-weight: 600;
  font-size: 16px; letter-spacing: -0.01em;
  color: var(--gray-900);
  margin-top: auto;
}
.bento-card.feature .bento-label { color: var(--paper); font-size: 22px; }
.bento-card .bento-context {
  margin-top: 8px;
  font-size: 13px; line-height: 1.5;
  color: var(--gray-600);
}
.bento-card.feature .bento-context { color: rgba(255,255,255,.7); font-size: 15px; max-width: 480px; }
.bento-card .src-pill { margin-top: 14px; align-self: flex-start; }
.bento-card.feature .src-pill {
  background: rgba(255,255,255,.06);
  color: var(--paper);
  border-color: rgba(255,255,255,.18);
}
.bento-card.feature .src-pill:hover {
  background: var(--gold); color: var(--paper); border-color: var(--gold);
}

/* ── Toggle (segmented, spring) ── */
.seg-toggle {
  display: inline-flex; position: relative;
  background: #FBFAF6;
  border: 1.5px solid var(--gold);
  border-radius: var(--radius-full);
  padding: 5px;
  gap: 0;
  box-shadow: 0 4px 16px rgba(212, 175, 55, 0.18), 0 1px 0 rgba(0,0,0,0.04) inset;
}
.ink .seg-toggle { background: rgba(0,0,0,.35); border-color: var(--gold); box-shadow: 0 4px 20px rgba(212, 175, 55, 0.25); }
.seg-toggle button {
  position: relative; z-index: 2;
  padding: 11px 22px;
  background: transparent; border: 0;
  font-family: var(--font-body); font-weight: 600;
  font-size: 14px; letter-spacing: 0.01em;
  color: var(--ink);
  cursor: pointer;
  border-radius: var(--radius-full);
  transition: color 240ms ease-out;
  white-space: nowrap;
}
.seg-toggle button:hover:not(.active) { color: var(--gold); }
.ink .seg-toggle button { color: rgba(255,255,255,.6); }
.seg-toggle button.active { color: var(--paper); }
.ink .seg-toggle button.active { color: var(--ink); }
.seg-toggle .pill {
  position: absolute; z-index: 1;
  top: 4px; bottom: 4px;
  background: var(--ink);
  border-radius: var(--radius-full);
  transition: left 480ms cubic-bezier(0.34, 1.56, 0.64, 1),
              width 480ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
.ink .seg-toggle .pill { background: var(--gold); }
/* ── Merge squeeze: word breathes closed like two things colliding ── */
.merge-squeeze {
  display: inline-block;
  animation: mergeSqueeze 4.2s cubic-bezier(0.22, 1, 0.36, 1) infinite;
  transform-origin: center;
  font-style: italic;
}
@keyframes mergeSqueeze {
  0%   { letter-spacing: 0.02em; transform: scaleX(1); }
  35%  { letter-spacing: -0.18em; transform: scaleX(0.78); }
  55%  { letter-spacing: -0.18em; transform: scaleX(0.78); }
  100% { letter-spacing: 0.02em; transform: scaleX(1); }
}
@media (prefers-reduced-motion: reduce) {
  .merge-squeeze { animation: none; letter-spacing: -0.12em; transform: scaleX(0.85); }
}


/* ── Animated horizontal bar charts ── */
.bars { display: flex; flex-direction: column; gap: 24px; }
.bar-row {
  display: grid;
  grid-template-columns: 220px 1fr 140px;
  align-items: center; gap: 24px;
}
.bar-row .name {
  font-family: var(--font-display); font-weight: 600;
  font-size: 17px; letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 10px;
}
.bar-row .name .badge {
  width: 6px; height: 24px; border-radius: 3px; background: var(--gray-300);
}
.bar-row.featured .name .badge { background: var(--ink); }
.bar-row .track {
  position: relative;
  height: 38px;
  background: var(--paper-2);
  border-radius: 6px;
  overflow: hidden;
}
.ink .bar-row .track { background: rgba(255,255,255,.06); }
.bar-row .fill {
  position: absolute; inset: 0;
  width: 0%;
  background: linear-gradient(90deg, var(--gray-700), var(--gray-900));
  border-radius: 6px;
  transition: width 800ms cubic-bezier(0.16, 1, 0.3, 1);
}
.bar-row.featured .fill {
  background: linear-gradient(90deg, var(--brand-700), var(--ink));
}
.ink .bar-row.featured .fill {
  background: linear-gradient(90deg, var(--gold-3), var(--gold));
}
.bar-row.warn .fill { background: linear-gradient(90deg, #8B1812, var(--warn-red)); }
.bar-row .value {
  font-family: var(--font-display); font-weight: 700;
  font-size: 22px; letter-spacing: -0.02em;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.bar-row .multiplier {
  display: block;
  font-family: var(--font-body);
  font-weight: 400; font-size: 11px;
  color: var(--gray-600);
  letter-spacing: 0.04em;
  margin-top: 4px;
}
.ink .bar-row .multiplier { color: rgba(255,255,255,.5); }

/* ── Numeric table ── */
.num-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-body);
}
.num-table th, .num-table td {
  padding: 18px 20px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  border-bottom: 1px solid var(--rule);
}
.num-table th:first-child, .num-table td:first-child {
  text-align: left;
}
.num-table thead th {
  font-family: var(--font-body);
  font-size: 12px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--gray-600);
  font-weight: 600;
  border-bottom: 2px solid var(--ink);
}
.num-table tbody td {
  font-size: 16px; font-weight: 500;
}
.num-table tbody tr td:first-child {
  font-family: var(--font-body); font-size: 12px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--gray-600); font-weight: 600;
}
.num-table tbody tr.featured {
  background: var(--ink); color: var(--paper);
}
.num-table tbody tr.featured td:first-child { color: var(--paper); }
.num-table tbody tr.featured td { border-bottom-color: var(--ink); }

/* ── Trajectory chart ── */
.traj-chart {
  position: relative;
  width: 100%; height: 480px;
  margin-top: 48px;
}
.traj-chart svg { width: 100%; height: 100%; overflow: visible; user-select: none; -webkit-user-select: none; }
.traj-scrub-hint {
  margin-top: 10px;
  font-family: var(--font-body);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gray-500);
  text-align: center;
}
.traj-line { fill: none; stroke-width: 2.25; stroke-linecap: round; stroke-linejoin: round; opacity: 0.78; }
.traj-line.yw    { stroke: var(--brand-700); stroke-width: 4.5; opacity: 1; filter: drop-shadow(0 2px 6px rgba(100,48,176,0.35)); }
.traj-line.rb    { stroke: var(--ink-2); stroke-dasharray: 7 5; }
.traj-line.ms    { stroke: var(--warn-red); stroke-dasharray: 2 5; }
.traj-line.yr    { stroke: var(--ok-green); stroke-dasharray: 9 3 2 3; }
.traj-axis text  { font-family: var(--font-body); font-size: 11px; fill: var(--gray-500); }
.traj-grid line  { stroke: var(--rule); stroke-dasharray: 1 4; }
.traj-anno {
  font-family: var(--font-display); font-weight: 600;
  font-size: 13px; fill: var(--ink);
}
.traj-anno-sub {
  font-family: var(--font-body); font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase;
  fill: var(--gray-600);
}
.traj-legend {
  display: flex; flex-wrap: wrap; gap: 24px;
  margin-top: 24px;
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--gray-700);
}
.traj-legend-item { display: inline-flex; align-items: center; gap: 8px; }
.traj-legend-swatch { width: 28px; height: 2.5px; }

/* ── Scoreboard (ink) ── */
.scoreboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 16px;
  overflow: hidden;
}
.scoreboard-cell {
  background: var(--ink);
  padding: 28px;
}
.scoreboard-cell .metric {
  font-family: var(--font-body);
  font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,.55);
  margin-bottom: 18px;
}
.scoreboard-cell .ranks {
  display: flex; flex-direction: column; gap: 10px;
}
.scoreboard-cell .rank {
  display: grid; grid-template-columns: 24px 1fr auto;
  gap: 12px; align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.scoreboard-cell .rank:last-child { border-bottom: 0; }
.scoreboard-cell .rank .pos {
  font-family: var(--font-display); font-weight: 700;
  font-size: 22px; color: rgba(255,255,255,.4);
  font-variant-numeric: tabular-nums;
}
.scoreboard-cell .rank.gold .pos { color: var(--gold); }
.scoreboard-cell .rank .who {
  font-family: var(--font-display); font-weight: 600;
  font-size: 16px; color: var(--paper);
  letter-spacing: -0.01em;
}
.scoreboard-cell .rank .val {
  font-family: var(--font-body); font-size: 11px;
  color: rgba(255,255,255,.6);
  letter-spacing: 0.04em;
}
.score-totals {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 16px; margin-top: 64px;
}
.score-total {
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 16px;
  padding: 32px;
}
.score-total.gold {
  border-color: var(--gold);
  background: linear-gradient(180deg, rgba(127,86,217,.10), transparent);
}
.score-total .who {
  font-family: var(--font-body); font-size: 11px;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(255,255,255,.55);
}
.score-total .num {
  margin: 18px 0 6px;
  font-family: var(--font-display); font-weight: 700;
  font-size: 76px; line-height: 0.9; letter-spacing: -0.04em;
  color: var(--paper);
  font-variant-numeric: tabular-nums;
}
.score-total.gold .num { color: var(--gold); }
.score-total .of {
  font-family: var(--font-body); font-size: 12px;
  color: rgba(255,255,255,.5);
}

/* ── Backlink concentration ── */
/* (.backlink-grid removed · superseded by .bk-table) */

/* ── Backlink concentration · editorial table ───────────────
   Replaced 4 dense parallel cards with a single sorted comparison
   table. Calmer, scannable, story-forward. */
.bk-table-wrap {
  border: 1px solid var(--rule);
  border-radius: 8px;
  overflow: hidden;
  background: var(--paper);
}
.bk-table {
  width: 100%;
  font-family: var(--font-body);
  display: grid;
  grid-template-columns:
    minmax(220px, 2fr)
    minmax(80px, 0.7fr)
    minmax(150px, 1fr)
    minmax(220px, 1.6fr)
    minmax(120px, 1fr);
}
.bk-table-head, .bk-row { display: contents; }
.bk-table-head > * {
  padding: 14px 20px;
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gray-600);
  border-bottom: 1px solid var(--rule);
  background: var(--paper-2);
}
.bk-row > * {
  padding: 22px 20px;
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center;
  font-size: 14px; color: var(--gray-800);
  background: var(--paper);
  transition: background 160ms ease-out;
}
.bk-row:last-child > * { border-bottom: 0; }
.bk-row:hover > * { background: color-mix(in oklab, var(--paper) 96%, var(--brand-700) 4%); }

.bk-table .num { justify-content: flex-end; text-align: right; font-variant-numeric: tabular-nums; }

.bk-who { flex-direction: column; align-items: flex-start; gap: 4px; }
.bk-name {
  font-family: var(--font-display); font-weight: 700;
  font-size: 17px; letter-spacing: -0.01em;
  color: var(--gray-900);
}
.bk-verdict {
  font-size: 12px; line-height: 1.45;
  color: var(--gray-600);
  font-weight: 400;
}

.bk-num {
  font-family: var(--font-display); font-weight: 700;
  font-size: 24px; letter-spacing: -0.02em;
  color: var(--gray-900);
}
.bk-num-md {
  font-family: var(--font-display); font-weight: 600;
  font-size: 16px; letter-spacing: -0.01em;
  color: var(--gray-900);
}
.bk-total-cell { flex-direction: column; align-items: flex-end; gap: 2px; }
.bk-sub {
  font-size: 11px; color: var(--gray-500);
  font-weight: 500;
}

.bk-conc-cell { flex-direction: column; align-items: stretch; gap: 8px; }
.bk-meter {
  height: 4px;
  background: var(--gray-150);
  border-radius: 999px;
  overflow: hidden;
}
.bk-meter-fill {
  height: 100%;
  background: var(--gray-500);
  transition: width 800ms cubic-bezier(0.16, 1, 0.3, 1);
  border-radius: 999px;
}
.bk-meter-label {
  font-size: 12px; color: var(--gray-600);
  display: flex; align-items: baseline;
  flex-wrap: wrap;
}
.bk-meter-label strong {
  font-family: var(--font-display); font-weight: 600;
  color: var(--gray-900); font-size: 13px;
  font-variant-numeric: tabular-nums;
}
.bk-meter-label span {
  color: var(--gray-500);
  font-size: 11px;
}

/* Tonal accent · left border on highlighted row */
.bk-row.hl > *:first-child { box-shadow: inset 3px 0 0 var(--brand-700); }
.bk-row.hl .bk-name { color: var(--brand-800); }
.bk-row.hl .bk-num  { color: var(--brand-700); }

.bk-row.warn .bk-meter-fill { background: var(--warn-red); }
.bk-row.ok   .bk-meter-fill { background: var(--brand-700); }

.bk-table-foot {
  padding: 16px 20px;
  border-top: 1px solid var(--rule);
  background: var(--paper-2);
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  font-size: 11px;
}
.bk-table-note { color: var(--gray-600); font-size: 12px; line-height: 1.5; flex: 1 1 280px; }

@media (max-width: 900px) {
  .bk-table { grid-template-columns: 1fr; }
  .bk-table-head { display: none; }
  .bk-row > * {
    padding: 6px 20px;
    border-bottom: 0;
    justify-content: flex-start; text-align: left;
  }
  .bk-row > *:first-child { padding-top: 20px; }
  .bk-row > *:last-child  { padding-bottom: 20px; border-bottom: 1px solid var(--rule); }
  .bk-table .num { justify-content: flex-start; }
  .bk-total-cell, .bk-conc-cell { align-items: flex-start; }
}

/* ── Authority Score featured stat board ── */
.as-board {
  margin: 24px 0 56px;
  padding: 40px 44px 32px;
  background: linear-gradient(180deg, #0E0B1A 0%, #1A1530 100%);
  border-radius: 20px;
  color: rgba(255,255,255,0.92);
  position: relative;
  overflow: hidden;
}
.as-board::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 70% 0%, rgba(212,175,55,0.10) 0%, transparent 55%);
  pointer-events: none;
}
.as-board-head { position: relative; margin-bottom: 36px; }
.as-board-eyebrow {
  font-family: var(--font-body);
  font-size: 11px; letter-spacing: 0.20em; text-transform: uppercase;
  color: var(--gold); font-weight: 500;
}
.as-board-title {
  margin-top: 14px;
  font-family: var(--font-display); font-weight: 600;
  font-size: clamp(22px, 2.2vw, 28px); line-height: 1.25;
  letter-spacing: -0.015em;
  color: #fff;
  max-width: 880px;
}
.as-board-title em {
  font-family: 'Poppins', system-ui, sans-serif;
  font-style: italic; font-weight: 500;
  color: var(--gold);
}
.as-board-row {
  position: relative;
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-top: 1px solid rgba(212,175,55,0.18);
  border-bottom: 1px solid rgba(212,175,55,0.18);
}
.as-cell {
  padding: 36px 28px 32px;
  border-right: 1px solid rgba(255,255,255,0.06);
  position: relative;
}
.as-cell:last-child { border-right: none; }
.as-cell.hl {
  background: linear-gradient(180deg, rgba(212,175,55,0.10) 0%, rgba(212,175,55,0.02) 100%);
}
.as-cell.hl::before {
  content: ''; position: absolute; left: 0; right: 0; top: -1px;
  height: 2px; background: var(--gold);
}
.as-num {
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(72px, 9vw, 132px);
  line-height: 0.95;
  letter-spacing: -0.04em;
  color: #FFFFFF;
  font-feature-settings: "tnum";
}
.as-cell.hl .as-num { color: #B998FF; }
.as-who {
  margin-top: 18px;
  font-family: var(--font-display); font-weight: 600;
  font-size: 18px; letter-spacing: -0.01em;
  color: #fff;
}
.as-cell.hl .as-who { color: #B998FF; }
.as-sub {
  margin-top: 8px;
  font-family: var(--font-body); font-size: 13px;
  color: rgba(255,255,255,0.85);
}
.as-sub-2 {
  margin-top: 2px;
  font-family: var(--font-body); font-size: 13px;
  color: rgba(255,255,255,0.70);
}
.as-board-foot {
  position: relative;
  margin-top: 22px;
  display: flex; align-items: flex-start; gap: 18px;
  flex-wrap: wrap;
}
.as-board-foot .src-pill {
  color: #FFFFFF;
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.18);
}
.as-board-foot .src-pill:hover {
  color: #FFFFFF;
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.28);
}
.as-board-note {
  font-family: var(--font-body); font-size: 13px; line-height: 1.55;
  color: rgba(255,255,255,0.78);
  max-width: 640px;
}
@media (max-width: 720px) {
  .as-board { padding: 28px 22px 24px; }
  .as-board-row { grid-template-columns: repeat(2, 1fr); }
  .as-cell { border-bottom: 1px solid rgba(255,255,255,0.06); }
  .as-cell:nth-child(2) { border-right: none; }
  .as-cell:nth-last-child(-n+2) { border-bottom: none; }
}

/* ── Social bento ── */
.social-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1fr;
  gap: 16px;
}
.social-card {
  border-radius: 20px; padding: 28px;
  border: 1px solid var(--rule);
  background: var(--paper);
  display: flex; flex-direction: column; gap: 12px;
  position: relative; overflow: hidden;
}
.social-card.feature { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.social-card .who {
  font-family: var(--font-display); font-weight: 700;
  font-size: 18px; letter-spacing: -0.01em;
}
.social-card.feature .who { color: var(--gold); }
.social-card .num {
  font-family: var(--font-display); font-weight: 700;
  font-size: 56px; letter-spacing: -0.04em; line-height: 0.92;
  font-variant-numeric: tabular-nums;
}
.social-card.feature .num { font-size: 88px; }
.social-card .breakdown {
  display: flex; flex-direction: column; gap: 6px;
  font-family: var(--font-body); font-size: 13px;
  color: var(--gray-700); font-weight: 500;
  margin-top: auto;
}
.social-card.feature .breakdown { color: rgba(255,255,255,.6); }
.social-card .breakdown div {
  display: flex; justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid var(--rule);
}
.social-card.feature .breakdown div { border-bottom-color: rgba(255,255,255,.08); }
.social-card .breakdown div:last-child { border-bottom: 0; }
.social-card .breakdown b {
  color: var(--ink); font-weight: 500;
}
.social-card.feature .src-pill {
  background: rgba(255,255,255,.06);
  color: var(--paper);
  border-color: rgba(255,255,255,.18);
}
.social-card.feature .src-pill:hover {
  background: var(--gold); color: var(--paper); border-color: var(--gold);
}
.social-card.feature .breakdown b-restore { color: var(--paper); }
.social-card.feature .breakdown b { color: var(--paper); }
.social-card .multiplier {
  margin-top: 8px;
  font-family: var(--font-body); font-size: 13px;
  color: var(--warn-red);
  letter-spacing: 0.04em;
}

/* ── Buyer behavior ── */
.behavior-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}
.behavior-card.behavior-geo { grid-column: span 2; }
.behavior-card.behavior-geo .behavior-bars { max-width: 560px; overflow: visible; }
.geo-row { position: relative; }
.geo-row .behavior-bar { cursor: help; }
.geo-info {
  display: inline-block;
  margin-left: 8px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--gray-200);
  color: var(--gray-700);
  font-family: var(--font-display);
  font-size: 9px; font-weight: 700;
  line-height: 14px;
  text-align: center;
  vertical-align: middle;
  letter-spacing: 0;
  text-transform: lowercase;
  font-style: italic;
  transition: background 160ms ease, color 160ms ease;
}
.geo-row:hover .geo-info,
.geo-row:focus-within .geo-info {
  background: var(--brand-700);
  color: var(--paper);
}
.geo-tooltip {
  position: absolute;
  left: 0;
  right: -16px;
  top: calc(100% + 8px);
  z-index: 20;
  padding: 12px 14px;
  background: var(--gray-950);
  color: #fff;
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 12px; line-height: 1.6;
  letter-spacing: 0.01em;
  box-shadow: 0 12px 28px rgba(20,12,40,0.28);
  opacity: 0;
  pointer-events: none;
  transform: translateY(-4px);
  transition: opacity 180ms ease, transform 180ms ease;
}
.geo-tooltip::before {
  content: "";
  position: absolute;
  left: 24px;
  top: -6px;
  width: 12px; height: 12px;
  background: var(--gray-950);
  transform: rotate(45deg);
}
.geo-row:hover .geo-tooltip,
.geo-row:focus-within .geo-tooltip {
  opacity: 1;
  transform: translateY(0);
}
.behavior-card {
  border: 1px solid var(--rule);
  border-radius: 20px;
  padding: 28px;
  background: var(--paper);
}
.behavior-card .title {
  font-family: var(--font-body); font-size: 11px;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--gray-600);
}
.behavior-card .headline {
  margin-top: 12px;
  font-family: var(--font-display); font-weight: 700;
  font-size: 56px; letter-spacing: -0.04em; line-height: 0.92;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.behavior-card .head-suffix {
  font-size: 0.36em; color: var(--gray-600);
  font-weight: 500; letter-spacing: -0.01em;
}
.behavior-card .desc {
  margin-top: 14px;
  font-size: 14px; line-height: 1.5;  color: var(--gray-700);
}
.behavior-card .yt-stats {
  margin-top: 24px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px 28px;
  border-top: 1px solid var(--rule);
  padding-top: 22px;
}
.behavior-card .yt-stats > div {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.behavior-card .yt-stat-label {
  font-family: var(--font-body);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gray-600);
  font-weight: 500;
}
.behavior-card .yt-stats strong {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--ink);
  line-height: 1.05;
  font-variant-numeric: tabular-nums;
}
.behavior-card .yt-stat-sub {
  font-family: var(--font-body);
  font-size: 12px;
  line-height: 1.4;
  color: var(--gray-600);
}
.behavior-bars {
  margin-top: 24px;
  display: flex; flex-direction: column; gap: 8px;
}
.behavior-bar {
  display: grid; grid-template-columns: 90px 1fr 60px;
  align-items: center; gap: 12px;
  font-family: var(--font-body); font-size: 11px;
  color: var(--gray-700);
}
.behavior-bar .row-track {
  height: 8px; background: var(--paper-2);
  border-radius: 4px; overflow: hidden;
}
.behavior-bar .row-fill {
  height: 100%; width: 0%;
  background: var(--ink);
  border-radius: 4px;
  transition: width 800ms cubic-bezier(0.16, 1, 0.3, 1);
}
.behavior-bar.peak .row-fill { background: var(--brand-700); }

/* ── Scaling projection (§ 10) ───────────────────────────── */
.sp-stage {
  margin-top: 8px;
  display: flex; flex-direction: column; gap: 48px;
}
.sp-headline {
  display: grid; grid-template-columns: 1.4fr 1fr;
  gap: 56px; align-items: end;
  padding: 40px 0 36px;
  border-bottom: 1px solid var(--rule);
}
.sp-headline-num {
  display: flex; align-items: baseline; flex-wrap: wrap; gap: 16px;
  /* Reserve enough vertical room for the largest possible number so dragging
     the slider can't change row height (which was causing the section to
     re-snap and flicker). */
  min-height: clamp(96px, 13vw, 188px);
}
.sp-headline-num .num {
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(80px, 12vw, 168px);
  /* Tabular figures keep digits at constant width — no horizontal jitter. */
  font-variant-numeric: tabular-nums;
  /* Reserve a stable min-width so the headline doesn't shift when the
     value moves between 4-, 5-, and 6-digit ranges during slider drag. */
  display: inline-block;
  min-width: 5.6ch;
  text-align: left;
  line-height: 0.9; letter-spacing: -0.05em;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum";
  transition: color 240ms ease-out;
}
.sp-headline-num .suffix {
  font-family: var(--font-body); font-size: 16px;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--gray-600);
  padding-bottom: 14px;
}
.sp-headline-meta {
  display: flex; flex-direction: column; gap: 14px;
  padding-bottom: 18px;
  font-family: var(--font-body);
}
.sp-meta-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: baseline;
  gap: 16px; padding-bottom: 12px;
  border-bottom: 1px dashed var(--rule);
}
.sp-meta-row:last-child { border-bottom: 0; padding-bottom: 0; }
.sp-meta-row .k {
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gray-600); font-weight: 500;
}
.sp-meta-row .v {
  font-family: var(--font-display); font-weight: 600;
  font-size: 18px; color: var(--ink); letter-spacing: -0.01em;
  /* Align values as a clean right-edge column with tabular figures so digits
     don't shift between rows or as the slider drags. */
  font-variant-numeric: tabular-nums;
  text-align: right;
  justify-self: end;
  min-width: 14ch;
  font-variant-numeric: tabular-nums;
}

/* Slider */
.sp-slider-wrap {
  position: relative; padding: 12px 0 36px;
}
.sp-slider-labels {
  display: flex; justify-content: space-between;
  font-family: var(--font-body); font-size: 11px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gray-600);
  margin-bottom: 16px;
}
.sp-slider-labels .dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--gold);
  margin-right: 10px; vertical-align: 2px;
}
.sp-slider-labels .dot-end { margin-left: 10px; margin-right: 0; background: var(--ink); }
.sp-slider-labels .lo { display: inline-flex; align-items: center; }
.sp-slider-labels .hi { display: inline-flex; align-items: center; }

.sp-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 6px;
  background: linear-gradient(90deg, var(--gold), var(--ink));
  border-radius: 3px; outline: none; cursor: grab;
  margin: 0;
}
.sp-slider:active { cursor: grabbing; }
.sp-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--paper); border: 3px solid var(--ink);
  box-shadow: 0 4px 16px rgba(20,20,15,.18);
  cursor: grab; transition: transform 160ms ease-out, box-shadow 160ms ease-out;
}
.sp-slider::-webkit-slider-thumb:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(127,86,217,.35); }
.sp-slider:active::-webkit-slider-thumb { cursor: grabbing; transform: scale(1.05); }
.sp-slider::-moz-range-thumb {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--paper); border: 3px solid var(--ink);
  box-shadow: 0 4px 16px rgba(20,20,15,.18);
  cursor: grab;
}

.sp-slider-ticks {
  position: relative; height: 28px; margin-top: 12px;
}
.sp-tick {
  position: absolute; top: 0;
  transform: translateX(-50%);
  background: transparent; border: 0;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 0; cursor: pointer;
  font-family: var(--font-body); font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gray-500);
  transition: color 160ms ease-out;
}
.sp-tick:hover { color: var(--ink); }
.sp-tick .tick-mark {
  display: block; width: 1px; height: 8px; background: var(--rule);
}
.sp-tick:hover .tick-mark { background: var(--ink); }

/* Ranked bars */
.sp-ranked-head {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
  font-family: var(--font-body); font-size: 11px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gray-600);
  padding-bottom: 16px; border-bottom: 1px solid var(--rule);
  margin-bottom: 20px;
}
.sp-bars {
  display: flex; flex-direction: column; gap: 10px;
}
.sp-bars-legend {
  display: grid; grid-template-columns: 50px 170px 130px 1fr 100px;
  gap: 20px; align-items: end;
  padding: 0 0 10px 0;
  margin-bottom: 6px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  font-family: var(--font-body);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gray-600);
}
.sp-bars-legend .spl-num { text-align: right; }
.sp-bars-caption {
  margin-top: 14px;
  padding: 12px 14px;
  background: rgba(127,86,217,0.06);
  border-left: 3px solid var(--brand-600);
  border-radius: 0 8px 8px 0;
  font-family: var(--font-body);
  font-size: 13px; line-height: 1.55;
  color: var(--gray-700);
}
.sp-bars-caption strong { color: var(--ink); font-weight: 700; }
.sp-num-val { display: block; }
.sp-num-lbl {
  display: block;
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 11px;
  color: var(--gray-500);
  letter-spacing: 0.04em;
  text-transform: none;
  margin-top: 2px;
}
.sp-bar-row {
  display: grid; grid-template-columns: 50px 170px 130px 1fr auto;
  gap: 20px; align-items: center;
  padding: 14px 12px;
  border-radius: 6px;
  border-bottom: 1px solid var(--rule);
  transition: transform 460ms cubic-bezier(0.16,1,0.3,1),
              opacity 460ms ease-out;
}
.sp-bar-row:last-child { border-bottom: 0; }
.sp-bar-row.featured { background: rgba(127,86,217,.04); }
.sp-rank {
  font-family: var(--font-display); font-weight: 700;
  font-size: 22px; color: var(--gray-500); letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.sp-bar-row.featured .sp-rank { color: var(--gold); }
.sp-name {
  font-family: var(--font-display); font-weight: 600; font-size: 16px;
  color: var(--ink);
  display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
}
.sp-name-tag {
  font-family: var(--font-body); font-weight: 600;
  font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 3px;
  background: rgba(127,86,217,0.10);
  color: var(--brand-700, #6430B0);
  border: 1px solid rgba(127,86,217,0.22);
}
.sp-bar-row.featured .sp-name-tag {
  background: rgba(196,154,108,0.14);
  color: var(--gold-3, #8B6630);
  border-color: rgba(196,154,108,0.32);
}
.sp-listings {
  display: flex; flex-direction: row; align-items: baseline; gap: 6px;
  border-left: 2px solid rgba(0,0,0,0.06);
  padding-left: 14px;
}
.sp-listings-num {
  font-family: var(--font-display); font-weight: 700;
  font-size: 22px; line-height: 1;
  color: var(--ink); letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.sp-bar-row.featured .sp-listings-num { color: var(--gold-3); }
.sp-listings-lbl {
  font-family: var(--font-body); font-weight: 500;
  font-size: 12px; letter-spacing: 0.02em;
  color: var(--gray-600);
}
.sp-name-old-small {
  display: block; margin-top: 2px;
  font-family: var(--font-body); font-weight: 400; font-size: 11px;
  color: var(--gray-600); letter-spacing: 0.04em;
  text-transform: none;
}
.sp-track {
  position: relative; height: 28px;
  background: var(--paper-2); border-radius: 4px; overflow: hidden;
}
.sp-fill {
  position: absolute; inset: 0; width: 0%;
  border-radius: 4px;
  transition: width 600ms cubic-bezier(0.16,1,0.3,1),
              background 320ms ease-out;
}
.sp-num {
  font-family: var(--font-display); font-weight: 700;
  font-size: 19px; color: var(--ink); letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  min-width: 80px; text-align: right;
}
.sp-bar-row.featured .sp-num { color: var(--gold-3); }

.sp-caveat {
  font-family: var(--font-body); font-size: 13px; line-height: 1.6;
  color: var(--gray-700);
  max-width: 820px;
  padding: 20px 24px;
  border-left: 3px solid var(--gold);
  background: var(--paper-2);
  border-radius: 0 6px 6px 0;
}
.sp-caveat strong {
  font-family: var(--font-display); font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.005em;
}

@media (max-width: 900px) {
  .sp-headline { grid-template-columns: 1fr; gap: 28px; padding: 24px 0; }
  .sp-bars-legend { display: none; }
  .sp-bar-row { grid-template-columns: 36px 1fr; gap: 10px; padding: 12px 0; }
  .sp-bar-row .sp-track, .sp-bar-row .sp-num { grid-column: 2; }
  .sp-bar-row .sp-num { text-align: left; }
  .sp-rank { font-size: 18px; }
  .sp-headline-num .num { font-size: 72px; }
}
@media (prefers-reduced-motion: reduce) {
  .sp-fill, .sp-bar-row { transition: none !important; }
}
/* ── Merger stress test ── */
.merger-controls {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 16px;
  margin-bottom: 32px;
}
.merger-bars { display: flex; flex-direction: column; gap: 14px; }
.merger-row {
  display: grid; grid-template-columns: 220px 1fr auto auto;
  gap: 24px; align-items: center;
  padding: 18px 0; border-bottom: 1px solid var(--rule);
  transition: opacity 600ms ease-out;
}
.merger-row.merged-out { opacity: 0; pointer-events: none; }
.merger-row .name {
  font-family: var(--font-display); font-weight: 600; font-size: 17px;
}
.merger-row .name small {
  display: block; margin-top: 2px;
  font-family: var(--font-body); font-size: 11px;
  color: var(--gray-600); font-weight: 400;
  letter-spacing: 0.04em;
}
.merger-row .track {
  position: relative; height: 36px;
  background: var(--paper-2); border-radius: 6px; overflow: hidden;
}
.merger-row .fill {
  position: absolute; inset: 0; width: 0%;
  background: linear-gradient(90deg, var(--gray-700), var(--ink));
  border-radius: 6px;
  transition: width 600ms cubic-bezier(0.16, 1, 0.3, 1);
}
.merger-row.featured .fill {
  background: linear-gradient(90deg, var(--brand-700), var(--ink));
}
.merger-row.warn .fill {
  background: linear-gradient(90deg, #8B1812, var(--warn-red));
}
.merger-row .num {
  font-family: var(--font-display); font-weight: 700;
  font-size: 22px; letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  min-width: 120px; text-align: right;
}
.merger-row .delta {
  font-family: var(--font-body); font-size: 11px;
  color: var(--gray-600); min-width: 100px; text-align: right;
}

/* ── Keywords distribution ── */
.kw-stack-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}
.kw-stack-card {
  border: 1px solid var(--rule);
  border-radius: 20px;
  padding: 28px;
  background: var(--paper);
}
.kw-stack-card.featured {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--paper);
}
.kw-stack-card .who {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 4px;
}
.kw-stack-card .who h4 {
  margin: 0; font-family: var(--font-display);
  font-weight: 700; font-size: 22px; letter-spacing: -0.02em;
}
.kw-stack-card.featured .who h4 { color: var(--gold); }
.kw-stack-card .who .total {
  font-family: var(--font-body); font-size: 11px;
  color: var(--gray-600);
}
.kw-stack-card.featured .who .total { color: rgba(255,255,255,.5); }
.kw-stack-card .top10 {
  margin: 16px 0;
  display: flex; align-items: baseline; gap: 12px;
}
.kw-stack-card .top10 .num {
  font-family: var(--font-display); font-weight: 700;
  font-size: 56px; letter-spacing: -0.04em; line-height: 0.9;
  font-variant-numeric: tabular-nums;
}
.kw-stack-card.featured .top10 .num { color: var(--paper); }
.kw-stack-card .top10 .label {
  font-family: var(--font-body); font-size: 11px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gray-600); max-width: 140px;
}
.kw-stack-card.featured .top10 .label { color: rgba(255,255,255,.6); }
.kw-stack-bar {
  display: flex; height: 24px; border-radius: 4px; overflow: hidden;
  background: var(--paper-2);
  margin-top: 18px;
}
.kw-stack-card.featured .kw-stack-bar { background: rgba(255,255,255,.06); }
.kw-stack-bar .seg { height: 100%; transition: width 800ms cubic-bezier(0.16, 1, 0.3, 1); }
.kw-stack-bar .seg.top3   { background: var(--gold); }
.kw-stack-bar .seg.t410   { background: var(--brand-500); }
.kw-stack-bar .seg.t1120  { background: var(--brand-700); }
.kw-stack-bar .seg.t2150  { background: var(--gray-500); }
.kw-stack-bar .seg.t51100 { background: var(--gray-300); }
.kw-stack-card.featured .kw-stack-bar .seg.t2150  { background: rgba(255,255,255,.35); }
.kw-stack-card.featured .kw-stack-bar .seg.t51100 { background: rgba(255,255,255,.15); }
.kw-stack-legend {
  display: flex; flex-wrap: wrap; gap: 12px 18px; margin-top: 12px;
  font-family: var(--font-body); font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--gray-600);
}
.kw-stack-card.featured .kw-stack-legend { color: rgba(255,255,255,.55); }
.kw-stack-legend span { display: inline-flex; align-items: center; gap: 6px; }
.kw-stack-legend i { width: 8px; height: 8px; border-radius: 2px; }

.kw-top-table {
  width: 100%; margin-top: 24px;
  border-collapse: collapse;
  font-family: var(--font-body); font-size: 12px;
}
.kw-top-table th, .kw-top-table td {
  padding: 8px 0;
  text-align: right;
  border-bottom: 1px solid var(--rule);
  color: var(--gray-700);
}
.kw-stack-card.featured .kw-top-table th,
.kw-stack-card.featured .kw-top-table td {
  border-bottom-color: rgba(255,255,255,.08);
  color: rgba(255,255,255,.7);
}
.kw-top-table th:first-child, .kw-top-table td:first-child {
  text-align: left;
  font-family: var(--font-body);
  color: var(--ink);
  font-weight: 500;
  padding-right: 12px;
}
.kw-stack-card.featured .kw-top-table td:first-child { color: var(--paper); }
.kw-top-table th {
  font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; font-weight: 500;
  color: var(--gray-500);
  border-bottom: 1.5px solid var(--ink);
}
.kw-stack-card.featured .kw-top-table th { color: var(--gold); border-bottom-color: var(--gold); }

/* ── Hyper-Transparency ── */
.transparency-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
}
.claim-card {
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 16px;
  padding: 28px;
  background: rgba(255,255,255,.02);
}
.claim-num {
  font-family: var(--font-body); font-size: 11px;
  letter-spacing: 0.16em; color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.claim-text {
  font-family: var(--font-display); font-weight: 600;
  font-size: 19px; line-height: 1.4; letter-spacing: -0.01em;
  color: var(--paper);
}
.claim-truth {
  margin-top: 18px; padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,.08);
  font-family: var(--font-body); font-size: 11px;
  color: rgba(255,255,255,.55);
  letter-spacing: 0.04em;
}
.claim-truth div { padding: 6px 0; display: flex; gap: 12px; }
.claim-truth div b {
  color: var(--gold); flex: 0 0 auto; min-width: 50px;
}
.claim-truth .body { color: rgba(255,255,255,.85); flex: 1; }

/* ── Counter-arguments / Defense ── */
.ca-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
}
.ca-card {
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 16px;
  padding: 32px;
  background: rgba(255,255,255,.02);
  display: flex; flex-direction: column;
}
.ca-card:nth-child(odd):last-child { grid-column: 1 / -1; }
.ca-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 18px;
}
.ca-num {
  font-family: var(--font-display); font-weight: 700;
  font-size: 14px; letter-spacing: 0.04em;
  color: rgba(255,255,255,.45);
}
.ca-threat {
  font-family: var(--font-body); font-size: 10px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 10px 5px 9px;
  border-radius: 4px;
  border: 1px solid transparent;
  background: transparent;
}
.ca-threat .dot {
  width: 7px; height: 7px; border-radius: 50%;
  display: inline-block;
  box-shadow: 0 0 0 3px rgba(255,255,255,.04);
}
.ca-threat-high {
  color: #FF8A80;
  border-color: rgba(255,138,128,.28);
  background: rgba(255,138,128,.06);
}
.ca-threat-high   .dot { background: #FF8A80; }
.ca-threat-medium {
  /* Amber family · readable on near-black, harmonises with the purple system without colliding */
  color: #F2B85A;
  border-color: rgba(242,184,90,.28);
  background: rgba(242,184,90,.06);
}
.ca-threat-medium .dot { background: #F2B85A; }
.ca-threat-low {
  color: #80E5B0;
  border-color: rgba(128,229,176,.26);
  background: rgba(128,229,176,.05);
}
.ca-threat-low    .dot { background: #80E5B0; }

.ca-attack {
  padding: 22px 24px;
  background: rgba(180, 35, 24, .10);
  border-left: 3px solid rgba(255, 138, 128, .55);
  border-radius: 4px;
  margin-bottom: 22px;
}
.ca-headline {
  font-family: var(--font-display); font-weight: 700;
  font-size: 22px; line-height: 1.25; letter-spacing: -0.015em;
  color: var(--paper);
  margin-bottom: 10px;
  text-wrap: balance;
}
.ca-attack-body {
  font-family: var(--font-body); font-size: 14px; line-height: 1.55;
  color: rgba(255,255,255,.78);
  font-style: italic;
}

.ca-response-label {
  font-family: var(--font-body); font-size: 11px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
}
.ca-response-row {
  padding: 14px 0;
  border-top: 1px solid rgba(255,255,255,.07);
}
.ca-response-row:first-of-type { border-top: 0; padding-top: 0; }
.ca-response-row:last-child { padding-bottom: 0; }
.ca-response-title {
  font-family: var(--font-display); font-weight: 600;
  font-size: 16px; line-height: 1.35; letter-spacing: -0.01em;
  color: var(--paper);
  margin-bottom: 6px;
}
.ca-response-body {
  font-family: var(--font-body); font-size: 13.5px; line-height: 1.6;
  color: rgba(255,255,255,.72);
}

/* ── Sources / downloads ── */
.dl-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
.dl-card {
  display: flex; align-items: center; justify-content: space-between;
  gap: 24px;
  padding: 24px 28px;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 12px;
  text-decoration: none;
  color: var(--paper);
  transition: all 240ms ease-out;
}
.dl-card:hover {
  background: rgba(127,86,217,.10); border-color: var(--gold);
}
.dl-card .left .label {
  font-family: var(--font-body); font-size: 10px;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--gold);
}
.dl-card .left .name {
  margin-top: 8px;
  font-family: var(--font-display); font-weight: 600;
  font-size: 17px; letter-spacing: -0.01em;
}
.dl-card .left .meta {
  margin-top: 4px;
  font-family: var(--font-body); font-size: 11px;
  color: rgba(255,255,255,.5);
  letter-spacing: 0.04em;
}
.dl-card .arrow {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,.06);
  display: grid; place-items: center;
  transition: all 240ms ease-out;
}
.dl-card:hover .arrow {
  background: var(--gold); color: var(--ink);
}

/* ── Pull quote / stage moments ── */
.stage-quote {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(40px, 5.5vw, 76px);
  line-height: 1.05; letter-spacing: -0.03em;
  max-width: 1100px;
  color: var(--paper);
}
.stage-quote em {
  font-family: 'Poppins', system-ui, sans-serif;
  font-style: italic; font-weight: 500;
  color: var(--gold);
  letter-spacing: -0.02em;
}
.stage-attrib {
  margin-top: 32px;
  font-family: var(--font-body); font-size: 11px;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(255,255,255,.5);
}

/* ── Section header (section-grid > .sec-head) ── */
.sec-head { max-width: 920px; margin-bottom: 48px; }
.sec-head .eyebrow { margin-bottom: 24px; }
.sec-head .title {
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(36px, 4.5vw, 60px);
  line-height: 1.05; letter-spacing: -0.03em;
  color: var(--ink);
}
.ink .sec-head .title { color: var(--paper); }
.sec-head .title em {
  font-family: 'Poppins', system-ui, sans-serif;
  font-style: italic; font-weight: 500;
  color: var(--brand-700);
}
.ink .sec-head .title em { color: var(--gold); }
.sec-head .lede {
  margin-top: 20px;
  max-width: 720px;
  font-size: 18px; line-height: 1.55;
  color: var(--gray-700);
}
.ink .sec-head .lede { color: rgba(255,255,255,.7); }

/* ── Footer ── */
footer {
  background: var(--ink);
  color: rgba(255,255,255,.6);
  padding: 80px 80px 64px;
  font-family: var(--font-body);
  font-size: 12px;
  border-top: 1px solid rgba(255,255,255,.08);
}
footer .inner {
  max-width: 1280px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr auto;
  gap: 48px; align-items: end;
}
footer .body {
  max-width: 720px;
  font-family: var(--font-body);
  font-size: 14px; line-height: 1.6;
  color: rgba(255,255,255,.65);
}
footer .body strong { color: var(--gold); font-weight: 500; }
footer .meta {
  font-family: var(--font-body); font-size: 11px;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(255,255,255,.4);
  text-align: right;
}

/* ── Responsive ── */
@media (max-width: 1080px) {
  .bento { grid-template-columns: repeat(2, 1fr); grid-auto-rows: auto; }
  .bento-card.feature { grid-column: span 2; grid-row: span 1; }
  .bento-card.std-2, .bento-card.std-3 { grid-column: span 1; }
  .social-grid { grid-template-columns: 1fr 1fr; }
  .behavior-grid { grid-template-columns: 1fr; }
  .backlink-grid, .kw-stack-grid, .transparency-grid, .ca-grid, .dl-grid { grid-template-columns: 1fr; } /* legacy */
  .scoreboard-grid { grid-template-columns: 1fr; }
  .score-totals { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 880px) {
  section { padding: 80px 24px; }
  .hero { padding: 100px 24px 60px; }
  .topnav { padding: 0 24px; }
  footer { padding: 64px 24px 48px; }
  footer .inner { grid-template-columns: 1fr; gap: 24px; }
  footer .meta { text-align: left; }
  .hero-stat { grid-template-columns: 1fr; gap: 32px; }
  .bento { grid-template-columns: 1fr; }
  .bento-card.feature { grid-column: span 1; }
  .bento-card .bento-num { font-size: 44px; }
  .bento-card.feature .bento-num { font-size: 88px; }
  .bar-row { grid-template-columns: 110px 1fr 90px; gap: 12px; }
  .bar-row .name { font-size: 14px; }
  .bar-row .name .badge { display: none; }
  .merger-row { grid-template-columns: 110px 1fr; gap: 8px; }
  .merger-row .num, .merger-row .delta { grid-column: 2; text-align: left; }
  .traj-chart { height: 360px; }
  .stage-quote { font-size: 36px; }
  .reveal.in { animation-duration: 500ms; }
  .seg-toggle .pill { transition-duration: 340ms; }
}

/* ─────────────────────────────────────────────────────────────
   Dark-section overrides - body copy on .ink must be PURE WHITE
   (WCAG contrast on near-black). Purple is reserved for
   numeric accents and decorative em - never body copy.
   ───────────────────────────────────────────────────────────── */
section.ink,
section.ink p,
section.ink li,
section.ink span:not([class*="badge"]):not([class*="pill"]):not([class*="src-"]),
section.ink td,
section.ink th,
section.ink small,
section.ink b,
section.ink strong {
  color: #FFFFFF;
}
section.ink .lede,
section.ink .breakdown,
section.ink .multipliers,
section.ink .meta,
section.ink .stage-attrib,
section.ink .traj-legend,
section.ink .src-legend,
section.ink .behavior-bar,
section.ink .merger-row .delta,
section.ink .num-table tbody tr td:first-child,
section.ink .num-table thead th { color: #FFFFFF; }

footer,
footer .body,
footer .meta,
footer p,
footer span,
footer small { color: #FFFFFF; }
footer .body strong { color: #FFFFFF; font-weight: 600; }

/* big numeric accents on dark stay purple - high-contrast against ink */
section.ink .bento-card.feature .bento-num,
section.ink .score-total.gold .num,
section.ink .scoreboard-cell .rank.gold .pos,
section.ink .social-card.feature .num,
section.ink .kw-stack-card.featured .top10 .num { color: var(--paper); }

/* eyebrows & metric labels on dark - soft white instead of purple */
section.ink .ds-eyebrow,
section.ink .eyebrow,
section.ink .bento-card.feature .bento-eyebrow,
section.ink .claim-num,
section.ink .scoreboard-cell .metric,
section.ink .score-total .who,
section.ink .dl-card .left .label { color: rgba(255,255,255,.7); }

/* truth/watch labels in claim cards - keep white */
section.ink .claim-truth div b { color: #FFFFFF; }

/* stage-quote em - white italic, not purple */
section.ink .stage-quote em,
section.ink .sec-head .title em { color: #FFFFFF; }

/* dark-section pills/borders use white-alpha, not purple */
.ink .src-pill:hover { background: #FFFFFF; color: var(--ink); border-color: #FFFFFF; }
.score-total.gold {
  border-color: rgba(255,255,255,.4);
  background: linear-gradient(180deg, rgba(255,255,255,.04), transparent);
}
.scoreboard-cell .rank.gold .pos { color: #FFFFFF; }
.dl-card:hover {
  background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.5);
}
.dl-card:hover .arrow { background: #FFFFFF; color: var(--ink); }
.kw-stack-card.featured .who h4 { color: #FFFFFF; }
.kw-stack-card.featured .kw-top-table th { color: rgba(255,255,255,.7); border-bottom-color: rgba(255,255,255,.3); }
.social-card.feature .who { color: #FFFFFF; }
.bento-card.feature .src-pill:hover { background: #FFFFFF; color: var(--ink); border-color: #FFFFFF; }
.social-card.feature .src-pill:hover { background: #FFFFFF; color: var(--ink); border-color: #FFFFFF; }
.kw-stack-card.featured .src-pill {
  background: rgba(255,255,255,.06);
  color: #FFFFFF;
  border-color: rgba(255,255,255,.18);
}
.kw-stack-card.featured .src-pill:hover {
  background: #FFFFFF;
  color: var(--ink);
  border-color: #FFFFFF;
}
.ink .seg-toggle .pill { background: #FFFFFF; }
.ink .seg-toggle button[aria-pressed="true"] { color: var(--ink); }

/* ─────────────────────────────────────────────────────────────
   Mobile - proper container spacing, no overflow
   ───────────────────────────────────────────────────────────── */
@media (max-width: 720px) {
  section { padding: 64px 20px; }
  .hero { padding: 88px 20px 48px; }

  background: linear-gradient(180deg, var(--cin-purple-2) 0%, var(--cin-paper) 100%);
}
.cin-shim.light-to-dark {
  background: linear-gradient(180deg, var(--cin-paper) 0%, var(--cin-deep) 100%);
}
.cin-shim.deep-to-purple {
  background: linear-gradient(180deg, var(--cin-deep) 0%, var(--cin-purple) 100%);
}
.cin-shim.purple-to-violet {
  background: linear-gradient(180deg, var(--cin-purple) 0%, var(--cin-violet) 100%);
}

/* ── Scroll snap disabled — the snapping was creating a jumpy feel as the
   user scrolled. Native scroll feels more natural for a long report. ── */
html {
  scroll-padding-top: 64px; /* keep anchor offsets clear of the fixed topnav */
}

/* ── Apple-ish nav refinements over dark bg ───────────────── */
.topnav.cin-on-dark {
  background: transparent;
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  border-bottom-color: transparent;
  color: #fff;
}

/* ── Two-column data on a stage (rebrands existing components) */
.cin-two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}
.cin-two-col .copy h3 {
  margin: 0;
  font-family: 'Poppins', system-ui, sans-serif;
  font-weight: 700;
  font-size: clamp(36px, 4.4vw, 64px);
  line-height: 1.06;
  letter-spacing: -0.02em;
}
.cin-two-col .copy h3 em { font-style: italic; color: var(--cin-lilac); }
.cin-two-col .copy p {
  margin-top: 20px;
  font-size: 17px;
  line-height: 1.55;
  color: rgba(255,255,255,.72);
  max-width: 480px;
  text-wrap: pretty;
}
.stage.cin-paper .cin-two-col .copy p { color: rgba(20,20,15,.72); }

@media (max-width: 900px) {
  .cin-two-col { grid-template-columns: 1fr; gap: 40px; }
  .stage-pin > .stage-inner { padding: 0 24px; }
  .cin-multipliers { gap: 24px; }
}

/* ── Smooth scroll & better browser scroll feel ───────────── */
@media (prefers-reduced-motion: no-preference) {
  html {
    scroll-behavior: smooth;
  }
}

/* ── Hide the original .hero (we replace it with cinematic version) */
.cin-hide-original .hero { display: none; }

/* ── Hero trajectory background ─────────────────────────────
   Faint full-bleed line graph behind the hero text. Lines draw in
   left-to-right when the hero appears. Hovering a line reveals
   that brand's name. The YachtWay line is bolder, gold, with a
   soft glow, and visually leads the eye toward the CTA region. */
.htb {
  position: absolute;
  inset: 0;
  z-index: 0;          /* sits behind .stage-pin content (z:1) */
  overflow: hidden;
  pointer-events: none; /* only the inner <g>s opt back in */
}
.htb-svg {
  width: 100%;
  height: 100%;
  display: block;
}
/* Lines themselves are static; reveal is driven by a clipPath rectangle
   that grows from width 0 to full width over 5s (set inline on the rect). */
.htb-series .htb-line {
  transition:
    stroke 280ms ease,
    stroke-width 280ms ease,
    opacity 280ms ease;
}
.htb-series .htb-fill {
  opacity: 0;
  transition: opacity 1600ms ease 4400ms;
}
.htb-svg.is-played .htb-series .htb-fill {
  opacity: 1;
}
.htb-series .htb-dot {
  opacity: 0;
  transition: opacity 360ms ease, transform 280ms ease;
  transform-origin: center;
  transform-box: fill-box;
}
.htb-svg.is-played .htb-series .htb-dot {
  opacity: 1;
}
/* Hover state: line bumps up in opacity / weight, label fades in. */
.htb-series .htb-label {
  opacity: 0;
  transition: opacity 200ms ease;
  pointer-events: none;
}
.htb-series.is-hovered .htb-label,
.htb-series.is-brand .htb-label {
  opacity: 1;
}
.htb-series.is-brand .htb-label {
  /* keep YachtWay's label always visible — it anchors the chart */
  opacity: 0.85;
}
/* (.is-faded opacity defined alongside the hover line/dot rules below) */
.htb-svg.has-hover .htb-series.is-faded .htb-label {
  opacity: 0;
}
.htb-series.is-peer.is-hovered .htb-line {
  stroke: rgba(255,255,255,0.85) !important;
  stroke-width: 1.8 !important;
  opacity: 0.9 !important;
}
.htb-series.is-peer.is-hovered .htb-dot {
  fill: #fff !important;
  r: 4;
}
.htb-svg.has-hover .htb-series.is-faded {
  opacity: 0.10;
}
.htb-series.is-brand.is-hovered .htb-dot {
  transform: scale(1.25);
}

/* Soft vignette over the chart so the headline contrast stays strong. */
.htb::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 40%, rgba(20,20,15,0.55) 0%, rgba(20,20,15,0) 70%);
  pointer-events: none;
  z-index: 1;
}

@media (max-width: 720px) {
  /* On phones the trajectory becomes more abstract — push it lower
     so headline+CTA breathing room stays clean. */
  .htb { top: 30%; }
  .htb::after { background: radial-gradient(ellipse at 50% 50%, rgba(20,20,15,0.65) 0%, rgba(20,20,15,0) 80%); }

  /* ── Mobile: stop horizontal shift caused by oversized cinematic numbers ── */
  /* The big number (`.cin-num`) + its trailing italic suffix would push past the
     viewport on small screens, creating a few px of horizontal shift that body
     overflow:hidden can't fully contain. Cap the size, allow the suffix to wrap,
     and force the wrapper to fit its parent. */
  .cin-num {
    font-size: clamp(64px, 16vw, 120px);
    word-break: break-word;
    max-width: 100%;
  }
  .cin-num-suffix {
    white-space: normal;
    display: inline-block;
    font-size: 0.22em;
    line-height: 1.2;
    max-width: 100%;
  }
  .cin-scale, .cin-reveal { max-width: 100%; }

  /* Stage containers: clip cinematic SVG flourishes (htb dots) so a 1–2px
     glyph overhang at the right edge can never produce horizontal scroll. */
  .stage { overflow-x: clip; }
  .stage-pin, .stage-inner { max-width: 100%; }
}
</style>
